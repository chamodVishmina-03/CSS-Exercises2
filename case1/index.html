<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sidebar Menu</title>
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #eee;
        }


        .sidebar {
            width: 70px;
            height: 100vh;
            background: transparent;
            padding-top: 20px;
        }


        .menu-item {
            display: flex;
            align-items: center;
            width: 60px;
            height: 50px;
            margin: 15px;
            background: linear-gradient(45deg, #7b2ff7, #9d4edd);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }


        .menu-item i {
            min-width: 60px;
            text-align: center;
            font-size: 18px;
        }


        .menu-item span {
            white-space: nowrap;
            opacity: 0;
            transition: 0.3s;
        }


        .menu-item:hover {
            width: 200px;
        }

        .menu-item:hover span {
            opacity: 1;
        }


        .menu-item.active span {
            opacity: 1;
        }

        i{
            display:block;
        }


    </style>




</head>
<body>

<div class="sidebar">

    <div class="menu-item">
        <i class="fa-solid fa-user"></i>
        <span>Menu One</span>

    </div>

    <div class="menu-item active">
        <i class="fa-solid fa-truck-medical"></i>
        <span>Menu Two</span>
    </div>

    <div class="menu-item">
        <i class="fa-solid fa-globe"></i>
        <span>Menu Three</span>
    </div>

    <div class="menu-item">
        <i class="fa-solid fa-layer-group"></i>
        <span>Menu Four</span>
    </div>

    <div class="menu-item">
        <i class="fa-solid fa-cart-shopping"></i>
        <span>Menu Five</span>
    </div>

</div>

</body>
</html>
